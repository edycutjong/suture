<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="var(--primary, #06B6D4)"/>
      <stop offset="100%" stop-color="var(--accent, #A855F7)"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <!-- Base background (transparent for asset generation) -->
  <rect width="512" height="512" rx="120" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.08)" stroke-width="4"/>
  <!-- Central cross / node structure -->
  <path d="M224 128h64v96h96v64h-96v96h-64v-96h-96v-64h96v-96z" fill="url(#brandGrad)" filter="url(#glow)"/>
  <!-- Connecting nodes -->
  <circle cx="256" cy="96" r="24" fill="url(#brandGrad)"/>
  <circle cx="256" cy="416" r="24" fill="url(#brandGrad)"/>
  <circle cx="96" cy="256" r="24" fill="url(#brandGrad)"/>
  <circle cx="416" cy="256" r="24" fill="url(#brandGrad)"/>
</svg>
