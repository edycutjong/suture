<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1280, height=720">
  <title>Suture — YouTube Thumbnail</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;600&family=Orbitron:wght@600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./_asset-utilities.css">
  <style>
    html, body { width: 1280px; height: 720px; }
    .container { position: relative; width: 1280px; height: 720px; display: flex; align-items: center; justify-content: center; }
    .main-content { position: relative; z-index: 10; text-align: center; display: flex; flex-direction: column; align-items: center; }
    .giant-number { font-family: var(--font-display); font-size: 200px; font-weight: 800; line-height: 1; background: var(--gradient-hero); background-clip: text; -webkit-background-clip: text; color: transparent; filter: drop-shadow(0 0 60px var(--primary-glow)); margin: 0; }
    .hook-text { font-family: var(--font-display); font-size: 52px; font-weight: 600; color: var(--text-hi); margin: -4px 0 0 0; letter-spacing: 4px; text-transform: uppercase; }
    .hook-sub { font-family: var(--font-ui); font-size: 26px; color: var(--text-mid); margin: 20px 0 0 0; }
    .corner-logo { position: absolute; top: 32px; left: 40px; display: flex; align-items: center; gap: 12px; z-index: 10; }
    .corner-logo img { width: 48px; height: 48px; filter: drop-shadow(0 0 16px var(--primary-glow)); }
    .corner-logo-text { font-family: var(--font-display); font-size: 24px; font-weight: 600; color: var(--text-hi); letter-spacing: 2px; }
    .kicker-pill { position: absolute; bottom: 36px; right: 44px; font-family: var(--font-mono); font-size: 14px; padding: 8px 20px; border-radius: var(--radius-full); background: rgba(168,85,247,0.12); border: 1px solid rgba(168,85,247,0.3); color: #A855F7; z-index: 10; }
    .status-row { position: absolute; bottom: 36px; left: 44px; display: flex; align-items: center; gap: 10px; z-index: 10; }
    .status-row .status-dot-pulse { background: #22C55E; }
    .status-label { font-family: var(--font-mono); font-size: 13px; color: var(--text-low); }
    /* Floating pipeline step badges */
    .float-badge { position: absolute; font-family: var(--font-mono); font-size: 13px; padding: 6px 14px; border-radius: 10px; z-index: 10; }
    .float-badge.detect { top: 140px; right: 80px; background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.25); color: #EF4444; }
    .float-badge.reason { top: 200px; right: 140px; background: rgba(168,85,247,0.1); border: 1px solid rgba(168,85,247,0.25); color: #A855F7; }
    .float-badge.heal { top: 260px; right: 60px; background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.25); color: #22C55E; }
  </style>
</head>
<body>
  <div class="container">
    <div class="background"></div>
    <div class="grid-overlay"></div>
    <div class="aurora-orb primary" style="width:600px;height:600px;top:50%;left:50%;transform:translate(-50%,-50%);"></div>
    <div class="aurora-orb accent" style="width:400px;height:400px;top:-50px;right:-50px;"></div>

    <div class="corner-logo">
      <img src="./icon.svg" alt="Suture">
      <span class="corner-logo-text">SUTURE</span>
    </div>

    <div class="main-content">
      <h1 class="giant-number">&lt;60s</h1>
      <p class="hook-text">Self-Healing Pipelines</p>
      <p class="hook-sub">Gemini 3 fixes your broken Fivetran syncs autonomously</p>
    </div>

    <div class="float-badge detect">● DETECT</div>
    <div class="float-badge reason">● REASON</div>
    <div class="float-badge heal">● HEAL ✓</div>

    <div class="status-row">
      <span class="status-dot-pulse"></span>
      <span class="status-label">LIVE HEALING</span>
    </div>

    <span class="kicker-pill">Google Cloud Rapid Agent Hackathon</span>
    <div class="noise-overlay"></div>
  </div>
</body>
</html>
