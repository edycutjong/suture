<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1200, height=800">
  <title>Suture — Devpost Thumbnail</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;600&family=Orbitron:wght@600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./_asset-utilities.css">
  <style>
    html, body { width: 1200px; height: 800px; }
    .container { position: relative; width: 1200px; height: 800px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .icon-wrap { position: relative; margin-bottom: 40px; }
    .icon-wrap img { width: 280px; height: 280px; filter: drop-shadow(0 0 80px var(--primary-glow)); }
    /* Orbital ring around icon */
    .icon-ring { position: absolute; inset: -30px; border-radius: 50%; border: 1.5px solid rgba(6,182,212,0.15); }
    .icon-ring::after { content: ''; position: absolute; top: -4px; left: 50%; width: 8px; height: 8px; border-radius: 50%; background: var(--primary); box-shadow: 0 0 12px var(--primary-glow); transform: translateX(-50%); }
    h1 { font-family: var(--font-display); font-size: 110px; font-weight: 800; margin: 0 0 12px 0; background: var(--gradient-hero); background-clip: text; -webkit-background-clip: text; color: transparent; filter: drop-shadow(0 8px 24px rgba(0,0,0,0.7)); }
    .tagline { font-family: var(--font-ui); font-size: 26px; color: var(--text-mid); margin: 0 0 24px 0; }
    .pill-row { display: flex; gap: 10px; }
    .pill-row .tech-pill { font-size: 14px; padding: 6px 16px; }
    .version-badge { position: absolute; top: 36px; left: 40px; font-family: var(--font-mono); font-size: 16px; color: var(--text-mid); background: rgba(0,0,0,0.4); padding: 8px 16px; border-radius: var(--radius-8); border: 1px solid var(--border-subtle); }
    .hackathon-badge { position: absolute; bottom: 36px; right: 40px; font-family: var(--font-mono); font-size: 13px; color: var(--primary); padding: 8px 18px; border-radius: var(--radius-full); background: rgba(6,182,212,0.08); border: 1px solid rgba(6,182,212,0.2); }
  </style>
</head>
<body>
  <div class="container">
    <div class="background"></div>
    <div class="grid-overlay"></div>
    <div class="aurora-orb primary" style="width:500px;height:500px;top:50%;left:50%;transform:translate(-50%,-50%);"></div>
    <div class="aurora-orb accent" style="width:300px;height:300px;top:-40px;right:-40px;"></div>

    <div class="version-badge">v1.0.0</div>

    <div class="icon-wrap">
      <div class="icon-ring"></div>
      <img src="./icon.svg" alt="Suture">
    </div>
    <h1>Suture</h1>
    <p class="tagline">Autonomous Schema Drift Healer</p>
    <div class="pill-row">
      <span class="tech-pill">Gemini 3</span>
      <span class="tech-pill">Fivetran</span>
      <span class="tech-pill">FastAPI</span>
    </div>

    <span class="hackathon-badge">Google Cloud Rapid Agent Hackathon</span>
    <div class="noise-overlay"></div>
  </div>
</body>
</html>
