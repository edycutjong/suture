# ─────────────────────────────────────────────────────────────
# Suture — Production-Grade CI/CD Pipeline
# ─────────────────────────────────────────────────────────────
# 6-stage pipeline: Quality → Security → Build → E2E → Perf → Deploy
#
# Architecture:
#   Stage 1 (Quality) ──┐
#                        ├── parallel ──→ Stage 3 (Build)
#   Stage 2 (Security) ─┘                    │
#                                       Stage 4 (E2E)
#                                            │
#                                       Stage 5 (Performance)
#                                            │
#                                       Stage 6 (Deploy Gate)
# ─────────────────────────────────────────────────────────────

name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same PR/branch
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

# ─────────────────────────────────────────────────────────────
# STAGE 1 — Code Quality Gate
# ─────────────────────────────────────────────────────────────
jobs:
  # ── Frontend Quality ──────────────────────────────────────
  frontend-quality:
    name: "Stage 1 · Frontend Quality"
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: dashboard

    strategy:
      matrix:
        # Full matrix on main push, single node on PRs
        node-version: ${{ github.event_name == 'push' && fromJSON('[20, 22, 24]') || fromJSON('[20]') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Unit tests with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        if: matrix.node-version == 20
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: dashboard/coverage/
          retention-days: 7

  # ── Backend Quality ───────────────────────────────────────
  backend-quality:
    name: "Stage 1 · Backend Quality"
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: agent

    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: agent/requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff mypy

      - name: Lint
        run: ruff check .

      - name: Type check
        run: mypy .

      - name: Test
        run: pytest

  # ─────────────────────────────────────────────────────────
  # STAGE 2 — Security Gate (parallel with Stage 1)
  # ─────────────────────────────────────────────────────────

  # ── Secret Scanning ─────────────────────────────────────
  secret-scan:
    name: "Stage 2 · Secret Scanning"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog Secret Scan
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified

  # ── Dependency Audit ────────────────────────────────────
  dependency-audit:
    name: "Stage 2 · Dependency Audit"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # npm audit
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: dashboard

      - name: npm audit (high + critical)
        run: npm audit --audit-level=high
        working-directory: dashboard
        continue-on-error: true

      - name: License compliance check
        run: npx license-checker --production --failOn "GPL-3.0;AGPL-3.0" --summary
        working-directory: dashboard
        continue-on-error: true

      # pip audit
      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: pip audit
        run: |
          pip install pip-audit
          pip-audit -r agent/requirements.txt
        continue-on-error: true

  # ─────────────────────────────────────────────────────────
  # STAGE 3 — Build & Artifact Verification
  # ─────────────────────────────────────────────────────────
  build:
    name: "Stage 3 · Build Verification"
    needs: [frontend-quality, backend-quality]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: dashboard

      - name: Next.js production build
        run: npm run build
        working-directory: dashboard

      - name: Check bundle size
        run: |
          echo "📦 Bundle Size Report"
          echo "─────────────────────"
          if [ -d "dashboard/.next" ]; then
            TOTAL_SIZE=$(du -sk dashboard/.next/static | cut -f1)
            echo "Total static assets: ${TOTAL_SIZE}KB"
            if [ "$TOTAL_SIZE" -gt 1500 ]; then
              echo "::error::Bundle size ${TOTAL_SIZE}KB exceeds 1500KB error threshold"
              exit 1
            elif [ "$TOTAL_SIZE" -gt 1000 ]; then
              echo "::warning::Bundle size ${TOTAL_SIZE}KB exceeds 1000KB warning threshold"
            else
              echo "✅ Bundle size within budget"
            fi
          fi

      - name: Docker build verification (agent)
        run: docker build -t suture-agent:ci ./agent

  # ─────────────────────────────────────────────────────────
  # STAGE 4 — E2E Testing
  # ─────────────────────────────────────────────────────────
  e2e:
    name: "Stage 4 · E2E Tests"
    needs: [build]
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: dashboard

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build application
        run: npm run build

      - name: Run E2E tests
        run: npx playwright test
        env:
          NODE_ENV: production

      - name: Upload E2E artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            dashboard/playwright-report/
            dashboard/test-results/
          retention-days: 7

  # ─────────────────────────────────────────────────────────
  # STAGE 5 — Performance Testing
  # ─────────────────────────────────────────────────────────
  performance:
    name: "Stage 5 · Performance"
    needs: [build]
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: dashboard

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Lighthouse CI
        run: |
          npm install -g @lhci/cli
          lhci autorun
        continue-on-error: true

  # ─────────────────────────────────────────────────────────
  # STAGE 6 — Deploy Gate
  # ─────────────────────────────────────────────────────────
  deploy-gate:
    name: "Stage 6 · Deploy Gate"
    needs: [build, e2e, performance, secret-scan, dependency-audit]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: All gates passed
        run: |
          echo "🚀 All CI/CD gates passed!"
          echo ""
          echo "Pipeline Summary:"
          echo "  ✅ Stage 1 — Frontend Quality (lint, typecheck, tests)"
          echo "  ✅ Stage 1 — Backend Quality (ruff, mypy, pytest)"
          echo "  ✅ Stage 2 — Secret Scanning (TruffleHog)"
          echo "  ✅ Stage 2 — Dependency Audit (npm + pip)"
          echo "  ✅ Stage 3 — Build Verification (Next.js + Docker)"
          echo "  ✅ Stage 4 — E2E Tests (Playwright)"
          echo "  ✅ Stage 5 — Performance (Lighthouse CI)"
          echo ""
          echo "Ready for deployment."
