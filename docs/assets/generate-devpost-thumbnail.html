<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;600&family=Orbitron:wght@600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./_asset-utilities.css">
  <style>
    .background-intensified {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: radial-gradient(circle at 0% 0%, color-mix(in srgb, var(--primary) 45%, transparent) 0%, transparent 60%), 
                  radial-gradient(circle at 100% 100%, color-mix(in srgb, var(--accent) 45%, transparent) 0%, transparent 60%);
      z-index: -2;
    }
  </style>
</head>
<body style="width: 1200px; height: 800px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative;">
  <div class="background-intensified"></div>
  <div class="grid-overlay"></div>
  <div class="noise-overlay"></div>

  <div style="position: absolute; top: 40px; left: 40px;">
    <span class="mono-font" style="font-size: 20px; color: var(--text-mid); background: rgba(0,0,0,0.5); padding: 8px 16px; border-radius: var(--radius-8); border: 1px solid var(--border-subtle);">v1.0.0</span>
  </div>

  <img src="./icon.svg" style="height: 320px; width: 320px; margin-bottom: 48px; filter: drop-shadow(0 20px 60px var(--primary-glow));">
  
  <h1 class="display-font text-gradient" style="font-size: 112px; margin: 0; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.8));">
    Suture
  </h1>
</body>
</html>
