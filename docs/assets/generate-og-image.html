<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;600&family=Orbitron:wght@600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./_asset-utilities.css">
</head>
<body style="width: 1200px; height: 630px;">
  <div class="background"></div>
  <div class="grid-overlay"></div>
  <div class="noise-overlay"></div>

  <div style="display: flex; height: 100%; width: 100%;">
    <!-- Left 55% Content -->
    <div style="width: 55%; padding: 80px; display: flex; flex-direction: column; justify-content: center;">
      <!-- Live Badge -->
      <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 24px;">
        <div style="width: 12px; height: 12px; border-radius: 50%; background: var(--color-success); box-shadow: 0 0 12px var(--color-success);" class="status-dot-pulse"></div>
        <span class="mono-font" style="font-size: 16px; color: var(--color-success); letter-spacing: 2px;">LIVE MONITORING</span>
      </div>
      
      <!-- App Name & Metric -->
      <h1 class="display-font text-gradient" style="font-size: 96px; margin: 0 0 16px 0; line-height: 1.1; filter: drop-shadow(0 4px 20px rgba(0,0,0,0.5));">
        Suture
      </h1>
      
      <div style="display: flex; align-items: center; gap: 24px; margin-bottom: 32px;">
        <div class="glass-panel" style="padding: 12px 24px; border-left: 4px solid var(--accent);">
          <span class="mono-font" style="font-size: 24px; color: #fff;">&lt; 60s MTTR</span>
        </div>
      </div>
      
      <!-- One-liner -->
      <p style="font-size: 32px; color: var(--text-mid); margin: 0 0 48px 0; line-height: 1.4; max-width: 90%;">
        Autonomous Fivetran schema drift healer.
      </p>
      
      <!-- Tech Pills -->
      <div style="display: flex; gap: 12px; flex-wrap: wrap;">
        <span class="tech-pill">Python</span>
        <span class="tech-pill">FastAPI</span>
        <span class="tech-pill">Gemini 3</span>
        <span class="tech-pill">Next.js 16</span>
        <span class="tech-pill">Fivetran</span>
      </div>
    </div>
    
    <!-- Right 45% 3D Card -->
    <div style="width: 45%; display: flex; align-items: center; justify-content: center; perspective: 1200px;">
      <div class="glass-panel" style="width: 400px; height: 500px; transform: rotateY(-12deg) rotateX(4deg); box-shadow: var(--shadow-glow); display: flex; flex-direction: column; padding: 32px;">
        <!-- Mock UI or Diagram inside the card -->
        <div style="border-bottom: 1px solid var(--border-subtle); padding-bottom: 24px; margin-bottom: 24px; display: flex; justify-content: space-between; align-items: center;">
          <span class="mono-font" style="font-size: 14px; color: var(--text-mid);">Incident #4029</span>
          <span class="mono-font" style="font-size: 14px; color: var(--color-error);">DRIFT DETECTED</span>
        </div>
        <div style="flex: 1; display: flex; flex-direction: column; gap: 16px;">
          <div style="background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.2); border-radius: var(--radius-12); padding: 16px;">
            <div class="mono-font" style="font-size: 14px; color: var(--color-error); margin-bottom: 8px;">source.revenue</div>
            <div class="mono-font" style="font-size: 12px; color: var(--text-low);">Type: Missing Field</div>
          </div>
          <div style="display: flex; justify-content: center;">
            <div style="width: 2px; height: 40px; background: var(--border-default);"></div>
          </div>
          <div style="background: rgba(168, 85, 247, 0.1); border: 1px solid rgba(168, 85, 247, 0.2); border-radius: var(--radius-12); padding: 16px;">
            <div class="mono-font" style="font-size: 14px; color: var(--accent); margin-bottom: 8px;">Gemini Reasoning...</div>
            <div class="mono-font" style="font-size: 12px; color: var(--text-low);">Mapped to: annual_revenue</div>
          </div>
          <div style="display: flex; justify-content: center;">
            <div style="width: 2px; height: 40px; background: var(--border-default);"></div>
          </div>
          <div style="background: rgba(34, 197, 94, 0.1); border: 1px solid rgba(34, 197, 94, 0.2); border-radius: var(--radius-12); padding: 16px;">
            <div class="mono-font" style="font-size: 14px; color: var(--color-success);">HEALED & SYNCED</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
